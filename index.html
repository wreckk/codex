<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>codex</title>
    <meta

      content="A minimal starter project wired for GitHub and Vercel."
    />
    <link rel="stylesheet" href="/styles.css" />
